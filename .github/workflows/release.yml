name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Validate that tag version matches Cargo.toml
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
            use_cross: false
            binary_name: island
            crun_arch: amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-aarch64
            use_cross: true
            binary_name: island
            crun_arch: arm64

          - target: x86_64-apple-darwin
            os: macos-15
            platform: darwin-x86_64
            use_cross: false
            binary_name: island

          - target: aarch64-apple-darwin
            os: macos-14
            platform: darwin-aarch64
            use_cross: false
            binary_name: island

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x86_64
            use_cross: false
            binary_name: island.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --force

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download crun (Linux only)
        if: matrix.crun_arch
        run: |
          CRUN_VERSION="1.26"
          CRUN_URL="https://github.com/containers/crun/releases/download/${CRUN_VERSION}/crun-${CRUN_VERSION}-linux-${{ matrix.crun_arch }}"
          echo "Downloading crun ${CRUN_VERSION} for ${{ matrix.crun_arch }}..."
          curl -fsSL -o crun "$CRUN_URL"
          chmod +x crun
          ./crun --version || echo "crun downloaded (can't run cross-arch on this runner)"

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "artifacts/${{ matrix.binary_name }}"
          # Include crun for Linux targets
          if [ -f crun ]; then
            cp crun artifacts/crun
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: artifacts/

  release:
    name: Sign & Release
    needs: [validate, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Sign binaries and compute checksums
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          PLATFORMS="linux-x86_64 linux-aarch64 darwin-x86_64 darwin-aarch64 windows-x86_64"

          mkdir -p release/

          for platform in $PLATFORMS; do
            if [ "$platform" = "windows-x86_64" ]; then
              src="artifacts/${platform}/island.exe"
              dest="release/island-${VERSION}-${platform}.exe"
            else
              src="artifacts/${platform}/island"
              dest="release/island-${VERSION}-${platform}"
            fi

            cp "$src" "$dest"

            # Compute SHA256
            sha256sum "$dest" | awk '{print $1}' > "${dest}.sha256"

            # Sign with Ed25519 (requires OpenSSL 3.x)
            echo "$SIGNING_PRIVATE_KEY" > /tmp/signing-key.pem
            openssl pkeyutl -sign -inkey /tmp/signing-key.pem \
              -rawin -in "$dest" > "${dest}.sig.raw"
            xxd -p "${dest}.sig.raw" | tr -d '\n' > "${dest}.sig"
            rm -f "${dest}.sig.raw"
          done

          rm -f /tmp/signing-key.pem

          # Copy bundled crun binaries for Linux platforms
          for platform in linux-x86_64 linux-aarch64; do
            if [ -f "artifacts/${platform}/crun" ]; then
              cp "artifacts/${platform}/crun" "release/crun-${platform}"
            fi
          done

          # Create combined checksums file
          cd release/
          sha256sum island-${VERSION}-* crun-* 2>/dev/null | grep -v '\.sha256$' | grep -v '\.sig$' > "checksums-${VERSION}.sha256"
          cd ..

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"

          # Collect release assets (binaries + signatures + crun + checksums)
          ASSETS=()
          for f in release/island-${VERSION}-*; do
            # Skip individual .sha256 files — we have the combined one
            if [[ "$f" == *.sha256 ]] && [[ "$f" != *checksums* ]]; then
              continue
            fi
            ASSETS+=("$f")
          done
          # Include bundled crun binaries
          for f in release/crun-*; do
            [ -f "$f" ] && ASSETS+=("$f")
          done
          ASSETS+=("release/checksums-${VERSION}.sha256")

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "${ASSETS[@]}"

      - name: Register releases with coordinator
        if: ${{ vars.COORDINATOR_URL != '' }}
        env:
          COORDINATOR_URL: ${{ vars.COORDINATOR_URL }}
          COORDINATOR_ADMIN_KEY: ${{ secrets.COORDINATOR_ADMIN_KEY }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          PLATFORMS="linux-x86_64 linux-aarch64 darwin-x86_64 darwin-aarch64 windows-x86_64"
          REPO="${{ github.repository }}"

          for platform in $PLATFORMS; do
            if [ "$platform" = "windows-x86_64" ]; then
              asset_name="island-${VERSION}-${platform}.exe"
            else
              asset_name="island-${VERSION}-${platform}"
            fi

            download_url="https://github.com/${REPO}/releases/download/v${VERSION}/${asset_name}"
            checksum=$(cat "release/${asset_name}.sha256")
            signature=$(cat "release/${asset_name}.sig")
            size_bytes=$(stat -c%s "release/${asset_name}")

            curl -sf -X POST "${COORDINATOR_URL}/api/v1/admin/agent-releases" \
              -H "Authorization: Bearer ${COORDINATOR_ADMIN_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(cat <<EOF
          {
            "version": "${VERSION}",
            "platform": "${platform}",
            "download_url": "${download_url}",
            "signature": "${signature}",
            "checksum_sha256": "${checksum}",
            "size_bytes": ${size_bytes}
          }
          EOF
              )" && echo "Registered ${platform}" || echo "::warning::Failed to register ${platform}"
          done
