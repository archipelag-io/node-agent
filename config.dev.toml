# Development configuration for local testing
# Copy to config.toml or run with: cargo run -- --config config.dev.toml

[host]
name = "dev-local"
region = "local"

[coordinator]
nats_url = "nats://localhost:4222"

[workload]
# Use the mock container (no GPU required)
# Build first: cd ../workload-containers/llm-chat-mock && docker build -t archipelag-llm-chat-mock:latest .
llm_chat_image = "archipelag-llm-chat-mock:latest"
gpu_devices = []

[workload.resource_limits]
memory_mb = 2048
read_only_rootfs = true
tmpfs_size_mb = 256
network_disabled = true

[cache]
enable_preload = false
max_cached_images = 10

[signing]
# Disable signature verification for local dev
enabled = false
require_signature = false

[registry]
# Disable registry allowlist for local dev (allows any local image)
enabled = false
